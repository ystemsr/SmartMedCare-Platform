server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — serve index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the backend service.
    #
    # Nginx resolves `proxy_pass` hostnames once at startup unless a `resolver`
    # is configured AND the upstream is referenced via a variable. Without this
    # trick, recreating the backend container yields a fresh IP while nginx
    # keeps hitting the stale one — every /api/* request ends up as 502.
    # 127.0.0.11 is Docker's embedded DNS inside user-defined networks.
    location /api/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Disable caching for index.html
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
