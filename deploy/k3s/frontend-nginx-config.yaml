apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx-config
  namespace: smartmedcare
data:
  # Mirror of frontend/nginx/default.conf with two K3s adjustments:
  #   - resolver points at kube-dns (10.43.0.10) instead of Docker's
  #     embedded DNS (127.0.0.11), which does not exist in K3s pods.
  #   - upstream uses the in-cluster FQDN of the backend Service so
  #     resolution works regardless of the pod's resolv.conf search list
  #     (some hosts have corporate DNS catch-alls that hijack bare names).
  default.conf: |
    server {
        listen 80;
        server_name _;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        location /api/ {
            resolver 10.43.0.10 valid=10s ipv6=off;
            set $backend_upstream http://backend.smartmedcare.svc.cluster.local:8000;
            proxy_pass $backend_upstream;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
            chunked_transfer_encoding on;
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }
