spark.master                     spark://spark-master:7077
spark.submit.deployMode          client
spark.eventLog.enabled           false
spark.serializer                 org.apache.spark.serializer.KryoSerializer

spark.sql.catalogImplementation  hive
spark.sql.warehouse.dir          hdfs://hadoop-namenode:9000/user/hive/warehouse
spark.hadoop.fs.defaultFS        hdfs://hadoop-namenode:9000
spark.hadoop.hive.metastore.uris thrift://hive-metastore:9083

spark.driver.memory              1g
spark.executor.memory            1g
spark.executor.cores             1

# MySQL JDBC driver is baked into $SPARK_HOME/jars via Dockerfile.spark-apps,
# so `spark.jars.packages` is not needed at submit time.
